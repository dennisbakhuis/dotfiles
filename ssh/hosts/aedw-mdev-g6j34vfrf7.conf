# Host: aedw-mdev-g6j34vfrf7 (work laptop)
# Loaded automatically by install_scripts/ssh.sh when hostname matches.

# Github
Host github.com *.github.com
  AddKeysToAgent yes
  IdentityFile ~/.ssh/id_ed25519_github
  IdentitiesOnly yes

# Azure DevOps - MCP-TenneT
Host tennet-mcp
  HostName ssh.dev.azure.com
  User git
  IdentityFile ~/.ssh/rsa_4096_tennet_mcp
  IdentitiesOnly yes

# Bitbucket (internal)
Host bitbucket.alfa.local
    HostName bitbucket.alfa.local
    User git
    Port 29418
    IdentityFile ~/.ssh/id_ed25519_bitbucket
    IdentitiesOnly yes
