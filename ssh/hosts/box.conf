# Host: meterkast (home server)
# Loaded automatically by install_scripts/ssh.sh when hostname matches.

# Github (uses legacy id_rsa key on this box)
Host github.com *.github.com
  AddKeysToAgent yes
  IdentityFile ~/.ssh/id_ed25519_box
  IdentitiesOnly yes

Host forgejo.bakhuis.nu
    Port 2222
    User git
    AddKeysToAgent yes
    IdentityFile ~/.ssh/id_ed25519_box
    IdentitiesOnly yes
