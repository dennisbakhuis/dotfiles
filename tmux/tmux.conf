# ====================================================================
# Tmux Configuration
# ====================================================================
# Author: Dennis Bakhuis
# Date: 2025-10-12
#
# Key Bindings Quick Reference:
# ------------------------------
# Prefix: Ctrl-b (default)
#
# Windows (tabs):
#   c           - Create new window
#   ,           - Rename current window
#   n/p         - Next/Previous window
#   0-9         - Switch to window by number
#   Ctrl-h/l    - Previous/Next window (repeatable)
#   &           - Kill current window
#
# Panes (splits):
#   |           - Split horizontally (left/right)
#   -           - Split vertically (top/bottom)
#   h/j/k/l     - Navigate panes (vim-style)
#   H/J/K/L     - Resize panes (repeatable)
#   x           - Kill current pane
#   z           - Zoom/unzoom current pane
#   space       - Cycle through layouts
#
# Copy mode (vi-style):
#   [           - Enter copy mode
#   v           - Start selection
#   y           - Copy selection (uses isomorphic_copy/pbcopy)
#   q           - Exit copy mode
#   Mouse drag  - Select text
#   Mouse click - Copy selection (after drag, click in selected area)
#
# Other:
#   r           - Reload tmux config
#   ?           - Show all key bindings
# ====================================================================

# Ensure Homebrew bin is on PATH for `run-shell` invocations (tpm and plugin
# scripts shell out to bare `tmux`, which lives in /opt/homebrew/bin on macOS).
# The tmux server can be launched with a minimal PATH (e.g. /usr/bin:/bin:...),
# which makes those calls fail silently.
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-sidebar'

set-option -g history-limit 25000
set -g mouse on

# for neovim
set -sg escape-time 10
setw -g xterm-keys on
set -g allow-passthrough on

# vi for copy mode
setw -g mode-keys vi

# Vi-style copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Isomorphic copy integration for mouse selection
# Drag to select, click in selected area to copy (works with isomorphic_copy)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X copy-pipe "c" \; send-keys -X clear-selection

# status bar — dark "hacker" theme: near-black bar, purple active accents
set -g status-position top
set -g status-interval 1
set -g status-bg "#16161e"
set -g status-fg "#7d8590"

# Left side: session name as a purple "pill"
set -g status-left "#[fg=#16161e,bg=#bb9af7,bold] #S #[fg=#bb9af7,bg=#16161e]  "
set -g status-left-length 50

# Center: window list
set -g status-justify centre
set -g window-status-format "#[fg=#565f89,bg=#16161e] #I:#W "
set -g window-status-current-format "#[fg=#bb9af7,bg=#16161e,bold] #I:#W "
set -g window-status-separator ""

# Right side: pomo + cyan clock
set -g status-right "#(pomo) #[fg=#bb9af7,bg=#16161e] %H:%M "
set -g status-right-length 50

# count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

# reload configuration
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# unbind ctrl enter
unbind C-Enter

# True color settings
set -g default-terminal "$TERM"
set -ag terminal-overrides ",$TERM:Tc"

# Switch panes with hjkl (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with HJKL (hold prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Better window splitting (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Easy window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Quick window switching with number keys (no prefix needed after first press)
bind -r 0 select-window -t :0
bind -r 1 select-window -t :1
bind -r 2 select-window -t :2
bind -r 3 select-window -t :3
bind -r 4 select-window -t :4
bind -r 5 select-window -t :5
bind -r 6 select-window -t :6
bind -r 7 select-window -t :7
bind -r 8 select-window -t :8
bind -r 9 select-window -t :9

set-option -g focus-events on
set-option -g set-clipboard on

# only show status bar if there is more then one window
set -g status off
set-hook -g after-new-window      'if "[ #{session_windows} -gt 1 ]" "set status on"'
set-hook -g after-kill-pane       'if "[ #{session_windows} -lt 2 ]" "set status off"'
set-hook -g pane-exited           'if "[ #{session_windows} -lt 2 ]" "set status off"'
set-hook -g window-layout-changed 'if "[ #{session_windows} -lt 2 ]" "set status off"'

# Shell — leave default-command unset so tmux launches default-shell with
# argv[0]="-fish", which fish recognises as a login-shell invocation. This
# triggers path_helper (so /opt/homebrew/bin lands on PATH and `command -v`
# checks in conf.d/aliases.fish succeed) and `status is-login` blocks fire
# (fastfetch, etc.) without spawning an extra fish -c wrapper.
set -g default-shell "/opt/homebrew/bin/fish"

# plugin settings
set -g @menus_trigger 'Space'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# tpm sometimes exits non-zero even after a clean run (e.g. when one plugin's
# .tmux file emits a non-fatal warning), which makes tmux pop a viewer that
# needs a keypress to dismiss. Force exit 0 and redirect output to a log so the
# viewer never appears but failures stay debuggable (tail /tmp/tpm.log).
# PATH is set inline as belt-and-suspenders alongside the set-environment above.
run -b "PATH='/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin' ~/.tmux/plugins/tpm/tpm >/tmp/tpm.log 2>&1 || true"
